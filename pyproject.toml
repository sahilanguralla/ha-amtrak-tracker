[tool.commitizen]
name = "cz_conventional_commits"
version = "1.5.1"
version_files = [
    "custom_components/amtrak_tracker/manifest.json:version"
]
scopes = [
    "amtrak_tracker"
]
tag_format = "$version"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
