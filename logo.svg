<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070A13" />
      <stop offset="50%" stop-color="#0C101F" />
      <stop offset="100%" stop-color="#141B30" />
    </linearGradient>

    <!-- Backlight (Halo) Radial Gradient -->
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.25" />
      <stop offset="60%" stop-color="#0088FF" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Neon House Border Gradient -->
    <linearGradient id="haNeonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="50%" stop-color="#00A3FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>

    <!-- Glassmorphism Fill (Frosted Glass) -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02" />
    </linearGradient>

    <!-- Amtrak Travelmark Gradient -->
    <linearGradient id="amtrakGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#E1F7FF" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>

    <!-- Route Sweep Gradient (Amtrak Red to HA Cyan) -->
    <linearGradient id="sweepGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3366" />
      <stop offset="50%" stop-color="#9933FF" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>

    <!-- Glowing effect filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Squircle Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Subtle grid pattern in the background for a modern UI tech vibe -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1">
    <path d="M 0,64 L 512,64 M 0,128 L 512,128 M 0,192 L 512,192 M 0,256 L 512,256 M 0,320 L 512,320 M 0,384 L 512,384 M 0,448 L 512,448" />
    <path d="M 64,0 L 64,512 M 128,0 L 128,512 M 192,0 L 192,512 M 256,0 L 256,512 M 320,0 L 320,512 M 384,0 L 384,512 M 448,0 L 448,512" />
  </g>

  <!-- Glowing Backlight (Halo) behind the main symbol -->
  <circle cx="256" cy="245" r="180" fill="url(#haloGrad)" />

  <!-- Dotted Glowing Route Sweep (Amtrak Red -> Home Assistant Cyan) -->
  <g filter="url(#neonGlow)">
    <!-- Base track line -->
    <path d="M 80,410 C 180,360 220,200 432,150" fill="none" stroke="url(#sweepGrad)" stroke-width="3" opacity="0.4" stroke-linecap="round" />
    <!-- Glowing GPS telemetry tracking dots -->
    <path d="M 80,410 C 180,360 220,200 432,150" fill="none" stroke="url(#sweepGrad)" stroke-width="10" stroke-dasharray="1 24" stroke-linecap="round" />
  </g>

  <!-- Modern Integrated Home Assistant House Symbol (with Glassmorphic panel) -->
  <g filter="url(#softShadow)">
    <!-- Glassmorphic House Shape (Background panel) -->
    <path d="M 256,110 L 380,210 L 345,210 L 345,370 L 167,370 L 167,210 L 132,210 Z" 
          fill="url(#glassGrad)" 
          stroke="url(#haNeonGrad)" 
          stroke-width="6" 
          stroke-linejoin="round" 
          backdrop-filter="blur(10px)" />
  </g>

  <!-- Home Assistant connection network nodes in the upper house area -->
  <g opacity="0.8" filter="url(#neonGlow)">
    <!-- Thin connection lines linking nodes to the central train track -->
    <line x1="256" y1="110" x2="256" y2="210" stroke="#00E5FF" stroke-width="2" />
    <line x1="132" y1="210" x2="210" y2="240" stroke="#00E5FF" stroke-width="2" />
    <line x1="380" y1="210" x2="302" y2="240" stroke="#00E5FF" stroke-width="2" />

    <!-- Nodes (glow points) -->
    <circle cx="256" cy="110" r="10" fill="#FFFFFF" />
    <circle cx="132" cy="210" r="8" fill="#00E5FF" />
    <circle cx="380" cy="210" r="8" fill="#00E5FF" />
  </g>

  <!-- Official Amtrak Travelmark Logo (Glowing in the center of the house) -->
  <g filter="url(#neonGlow)">
    <g fill="url(#amtrakGrad)" transform="translate(256, 265) scale(1.35) translate(250.5, -502)">
      <path d="M-215.2,490c-20,5.5-32.7,9.5-41.8,19.3c4.4,1.8,9,3.5,13,4.7c4.7-9.3,13.2-16.8,28.9-23.6L-215.2,490z" />
      <path d="M-241,492.4c-2.4-0.2-5-0.7-7.1-1.3c-4.4-0.2-27.6-0.8-37.9,3.6c2.8,1.7,5.7,3.4,9.3,5.3c10.3-4.8,23.5-6.5,35.7-7.2V492.4z" />
      <path d="M-226.1,492.3c-3.2,0.4-8.3,0.6-11.4,0.6c-9.2,1-25.4,3.6-34.6,9.3c3.4,1.7,6.8,3.4,10.4,4.9c9.6-8.3,22.5-12,35.6-14.5C-226.1,492.6-226.1,492.3-226.1,492.3z" />
    </g>
  </g>
</svg>
