<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- White Squircle Canvas -->
  <rect width="512" height="512" rx="112" fill="#FFFFFF" />

  <!-- Signal / Tracker Waves (Concentric Arcs) -->
  <path d="M 137.3,126.9 A 145,145 0 0,1 374.7,126.9" fill="none" stroke="#005A87" stroke-width="14" stroke-linecap="round" />
  <path d="M 166,147 A 110,110 0 0,1 346,147" fill="none" stroke="#005A87" stroke-width="14" stroke-linecap="round" />
  <path d="M 194.6,167 A 75,75 0 0,1 317.4,167" fill="none" stroke="#005A87" stroke-width="14" stroke-linecap="round" />

  <!-- Minimalist Train Body (Front View) -->
  <!-- Symmetrical arched silhouette -->
  <path d="M 166,375 L 346,375 L 346,260 Q 346,180 256,180 Q 166,180 166,260 Z" fill="#005A87" />

  <!-- Windshield Cutout (Negative Space / White) -->
  <path d="M 196,250 L 316,250 L 306,220 Q 256,208 206,220 Z" fill="#FFFFFF" />

  <!-- Dynamic Chevron Red Stripe (Amtrak theme) -->
  <path d="M 166,285 L 230,285 L 256,305 L 282,285 L 346,285 L 346,305 L 282,305 L 256,325 L 230,305 L 166,305 Z" fill="#E31837" />

  <!-- Symmetrical Headlights (White Cutouts) -->
  <circle cx="210" cy="342" r="8" fill="#FFFFFF" />
  <circle cx="302" cy="342" r="8" fill="#FFFFFF" />

  <!-- Stylized Railway Tracks -->
  <line x1="200" y1="390" x2="140" y2="445" stroke="#005A87" stroke-width="14" stroke-linecap="round" />
  <line x1="312" y1="390" x2="382" y2="445" stroke="#005A87" stroke-width="14" stroke-linecap="round" />
  <line x1="164" y1="428" x2="348" y2="428" stroke="#005A87" stroke-width="14" stroke-linecap="round" />
</svg>