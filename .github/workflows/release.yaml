name: Release Tag

on:
  push:
    branches:
      - main
    paths:
      - 'custom_components/amtrak_tracker/manifest.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/amtrak_tracker/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-parse "refs/tags/${{ steps.get_version.outputs.version }}^{commit}" 2>/dev/null)
            HEAD_COMMIT=$(git rev-parse HEAD)
            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "Tag ${{ steps.get_version.outputs.version }} already exists on a different commit. Skipping release."
              exit 0
            fi
          fi
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Proceeding with release for tag ${{ steps.get_version.outputs.version }}."

      - name: Create Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
